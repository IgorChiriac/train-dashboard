<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚆 Commute · Horgen ⇄ Zürich</title>
  <meta name="description" content="Door-to-door commute board: walk, S2 train, walk — with live delays and a weather widget." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="S2 Board" />

  <link rel="preconnect" href="https://transport.opendata.ch" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
  <div id="refreshBar" class="refresh-bar" aria-hidden="true"></div>

  <main class="app">
    <header class="app__header">
      <div class="route" id="route">
        <span class="route__from" id="fromLabel">Home</span>
        <span class="route__arrow">→</span>
        <span class="route__to" id="toLabel">Office</span>
      </div>
      <p class="subtitle">Door-to-door · the quick <strong>S2</strong> is highlighted · tap a train for a catch timer</p>
      <p id="journeyLine" class="journey">—</p>
      <div class="livebar">
        <span id="liveDot" class="live live--ok">
          <span class="live__dot"></span>
          <span id="liveText" class="live__text">LIVE</span>
        </span>
        <span id="updated" class="updated">—</span>
      </div>
    </header>

    <section class="presets" id="presets" role="tablist" aria-label="Commute direction">
      <!-- preset pills injected by app.js -->
    </section>

    <section id="weather" class="wx" hidden aria-label="Weather"></section>

    <section class="controls">
      <label class="field field--walk">
        <span id="walkOriginLabel">🚶 to station</span>
        <input id="walkOriginInput" type="number" min="0" max="60" step="1" value="12" inputmode="numeric" />
      </label>
      <label class="field field--walk">
        <span id="walkDestLabel">🚶 from station</span>
        <input id="walkDestInput" type="number" min="0" max="60" step="1" value="9" inputmode="numeric" />
      </label>
      <button id="refreshBtn" class="btn" type="button" aria-label="Refresh now">
        <span class="btn__spinner" aria-hidden="true"></span>
        <span class="btn__label">Refresh</span>
      </button>
    </section>

    <section id="board" class="board" aria-live="polite">
      <!-- departure cards injected here -->
    </section>

    <footer class="app__footer">
      <span id="status" class="status">Loading departures…</span>
      <span class="credit">Data: <a href="https://transport.opendata.ch" target="_blank" rel="noopener">transport.opendata.ch</a> &middot; <a href="https://open-meteo.com" target="_blank" rel="noopener">open-meteo</a></span>
    </footer>
  </main>

  <script src="app.js?v=9"></script>
</body>
</html>
