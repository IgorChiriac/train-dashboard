<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="S2 board icon">
  <!-- Full-bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#0b1020"/>
  <rect x="40" y="40" width="432" height="432" rx="96" fill="#141a2e"/>
  <!-- subtle green glow ring -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="none" stroke="#3ddc84" stroke-opacity="0.35" stroke-width="6"/>
  <!-- S2 badge -->
  <rect x="116" y="150" width="280" height="150" rx="32" fill="#ffd23f"/>
  <text x="256" y="262" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="120" font-weight="800" text-anchor="middle" fill="#1a1300">S2</text>
  <!-- track + train hint -->
  <text x="256" y="396" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="92" text-anchor="middle">🚆</text>
</svg>
