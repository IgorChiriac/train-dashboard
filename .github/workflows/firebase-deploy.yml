name: Deploy to Firebase Hosting (production)

# Runs when a pull request is merged into main (a merge is a push to main),
# deploying the live site. Requires the FIREBASE_SERVICE_ACCOUNT repo secret
# (a Firebase service-account JSON key with the Firebase Hosting Admin role).
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: train-dashboard-6486d
          # Pin to the last version whose bundled google-auth-library/gaxios
          # authenticates a service account on Node 24. 15.22.1/15.22.2
          # regressed it with a keep-alive "Premature close" on the
          # oauth2/v4/token exchange (cf. firebase-tools#10692). 15.22.0 is the
          # exact version that deployed cleanly here on 2026-06-22.
          firebaseToolsVersion: "15.22.0"
