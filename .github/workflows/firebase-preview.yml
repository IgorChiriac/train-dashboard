name: Preview deploy (pull request)

# On every PR, deploy to a temporary Firebase Hosting preview channel and post
# the preview URL as a comment, so changes can be reviewed live before merging.
on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  preview:
    # Skip PRs from forks — they can't access the service-account secret.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to a preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        env:
          # Disable HTTP keep-alive to dodge the "Premature close" auth bug
          # (see .github/scripts/disable-keepalive.js).
          NODE_OPTIONS: "--require ${{ github.workspace }}/.github/scripts/disable-keepalive.js"
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: train-dashboard-6486d
          expires: 7d
          # Pin to the last version whose bundled google-auth-library/gaxios
          # authenticates a service account on Node 24 (15.22.1/15.22.2
          # regressed it with a keep-alive "Premature close"; cf.
          # firebase-tools#10692). 15.22.0 deployed cleanly here on 2026-06-22.
          firebaseToolsVersion: "15.22.0"
